name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['10', '11', '12', '13']
        include:
          - laravel: '10'
            testbench: '^8.0'
          - laravel: '11'
            testbench: '^9.0'
          - laravel: '12'
            testbench: '^10.0'
          - laravel: '13'
            testbench: '^11.0'
        exclude:
          - php: '8.2'
            laravel: '13'
          - php: '8.2'
            laravel: '12'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none

      - name: Set Testbench version
        run: |
          composer require "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
